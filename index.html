<!DOCTYPE html>
<html>
<head>
  <title>Space Dodger</title>

    <style>
        body {
              margin: 0;
                    background: black;
                          overflow: hidden;
                              }

                                  canvas {
                                        display: block;
                                              margin: auto;
                                                    background: #111;
                                                        }
                                                          </style>
                                                          </head>

                                                          <body>

                                                          <canvas id="game" width="500" height="700"></canvas>

                                                          <script>
                                                          const canvas = document.getElementById("game");
                                                          const ctx = canvas.getContext("2d");

                                                          let playerX = 220;

                                                          document.addEventListener("keydown", (e) => {
                                                            if (e.key === "ArrowLeft") playerX -= 20;
                                                              if (e.key === "ArrowRight") playerX += 20;
                                                              });

                                                              function gameLoop() {
                                                                ctx.clearRect(0,0,500,700);

                                                                  // player
                                                                    ctx.fillStyle = "cyan";
                                                                      ctx.fillRect(playerX, 620, 60, 60);

                                                                        // asteroid
                                                                          ctx.fillStyle = "gray";
                                                                            ctx.beginPath();
                                                                              ctx.arc(250,200,40,0,Math.PI*2);
                                                                                ctx.fill();

                                                                                  requestAnimationFrame(gameLoop);
                                                                                  }

                                                                                  gameLoop();
                                                                                  </script>

                                                                                  </body>
                                                                                  </html>
